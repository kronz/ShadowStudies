# Builds initiative/Version3/extension and publishes dist/ to GitHub Pages.
# After the first successful run: Repo → Settings → Pages → Source = "GitHub Actions".

name: Deploy Shadow Study V3 (GitHub Pages)

on:
  push:
    branches: ["main", "master"]
    paths:
      - "initiative/Version3/extension/**"
      - ".github/workflows/deploy-shadow-study-v3-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-shadow-study-v3
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: initiative/Version3/extension/package-lock.json

      - name: Install and build
        working-directory: initiative/Version3/extension
        env:
          # Project site URL is https://<user>.github.io/<repo>/ — must match repo name.
          VITE_BASE_PATH: /ShadowStudies/
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: initiative/Version3/extension/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
