# Summarization Configuration for YouTube Transcript Knowledge Base

# Claude API Settings
model: "claude-sonnet-4-20250514"
max_tokens: 16000
temperature: 0.7

# Processing Settings
batch_size: 10  # Number of transcripts to process before pausing
rate_limit_delay: 2  # Seconds to wait between API calls
max_retries: 3

# Output Settings
output_format: "markdown"
create_backup: true

# Summary Sections to Include
include_sections:
  - speakers
  - companies
  - problems
  - solutions
  - principles
  - key_quotes

# Prompt Template Path
prompt_template: "templates/summary_template.md"

# File Naming
summary_suffix: "_Summary"
timestamp_format: "%Y%m%d_%H%M%S"

# Error Handling
skip_on_error: true
log_errors: true
error_log_path: "transcripts/error_log.json"
